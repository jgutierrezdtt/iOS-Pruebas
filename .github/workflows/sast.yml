name: SAST — Static Analysis (Semgrep)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 3 * * 1"   # full scan every Monday 03:00 UTC
  workflow_dispatch:

jobs:
  sast:
    uses: jgutierrezdtt/Pipelines-Public/.github/workflows/reusable-security-analysis.yml@main
    with:
      semgrep_config: "auto"    # auto-detects Swift; add ".semgrep.yml" when custom rules exist
      cvss_gate_threshold: 7.0  # fail CI on HIGH or CRITICAL findings
    secrets: inherit
